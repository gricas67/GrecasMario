<!DOCTYPE html>
<html>
<head>
    <title>Juego - Arreglado el Suelo</title>
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: Arial; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px 4px #000; z-index: 10; }
        #respawnBtn { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); padding: 20px 40px; 
            font-size: 24px; cursor: pointer; background: #ff4747; color: white; border: none; border-radius: 10px; z-index: 20;
        }
    </style>
</head>
<body>
    <div id="ui"><h2>X: Espada | Flechas: Mover | Espacio: Saltar</h2></div>
    <button id="respawnBtn" onclick="resetGame()">REAPARECER</button>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const respawnBtn = document.getElementById('respawnBtn');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let gameActive = true;
        const player = {
            x: 100, y: 50, width: 30, height: 50,
            dy: 0, jumpForce: 12, gravity: 0.8, speed: 5,
            grounded: false, keys: {}, attacking: false, attackTimer: 0
        };

        let enemy = { x: 800, y: 0, width: 40, height: 40, speed: 3, alive: true };

        // Definimos el suelo claramente
        const GROUND_Y = canvas.height - 60;

        window.addEventListener('keydown', e => {
            player.keys[e.code] = true;
            if (e.code === 'KeyX' && !player.attacking) {
                player.attacking = true;
                player.attackTimer = 15;
            }
        });
        window.addEventListener('keyup', e => player.keys[e.code] = false);

        function resetGame() {
            player.x = 100; player.y = 50; player.dy = 0;
            enemy.x = canvas.width - 100; enemy.alive = true;
            gameActive = true;
            respawnBtn.style.display = 'none';
            loop();
        }

        function update() {
            if (!gameActive) return;

            // Movimiento lateral
            if (player.keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (player.keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += player.speed;
            
            // Salto
            if (player.keys['Space'] && player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }

            // Aplicar gravedad
            player.dy += player.gravity;
            player.y += player.dy;

            // --- DETECCIÓN DE SUELO (Súper sólida) ---
            if (player.y + player.height > GROUND_Y) {
                player.y = GROUND_Y - player.height;
                player.dy = 0;
                player.grounded = true;
            } else {
                player.grounded = false;
            }

            // Ataque con espada
            if (player.attacking) {
                player.attackTimer--;
                if (player.attackTimer <= 0) player.attacking = false;
                
                // Si la espada toca al enemigo
                if (enemy.alive && player.x + player.width + 25 > enemy.x && player.x < enemy.x + enemy.width && 
                    player.y + player.height > enemy.y && player.y < enemy.y + enemy.height) {
                    enemy.alive = false;
                }
            }

            // Enemigo
            if (enemy.alive) {
                enemy.y = GROUND_Y - enemy.height;
                enemy.x -= enemy.speed;
                if (enemy.x < -50) enemy.x = canvas.width;

                // Muerte del jugador
                if (!player.attacking && player.x < enemy.x + enemy.width && player.x + player.width > enemy.x &&
                    player.y + player.height > enemy.y && player.y < enemy.y + enemy.height) {
                    gameActive = false;
                    respawnBtn.style.display = 'block';
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar Suelo (Marrón con pasto verde arriba)
            ctx.fillStyle = '#4d2600'; // Tierra
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
            ctx.fillStyle = '#2ecc71'; // Pasto
            ctx.fillRect(0, GROUND_Y, canvas.width, 10);

            // Dibujar Enemigo
            if (enemy.alive) {
                ctx.fillStyle = 'red';
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                // Ojos del enemigo
                ctx.fillStyle = 'white';
                ctx.fillRect(enemy.x + 5, enemy.y + 10, 8, 8);
                ctx.fillRect(enemy.x + 25, enemy.y + 10, 8, 8);
            }

            // Dibujar Jugador (Chico de Negro)
            ctx.fillStyle = 'black'; 
            ctx.fillRect(player.x, player.y + 15, player.width, player.height - 15); // Ropa
            ctx.fillStyle = '#ffdbac'; 
            ctx.fillRect(player.x + 5, player.y, 20, 20); // Cara
            ctx.fillStyle = 'black';
            ctx.fillRect(player.x + 5, player.y - 2, 20, 7); // Pelo

            // Dibujar Espada
            if (player.attacking) {
                ctx.fillStyle = '#bdc3c7'; // Color metal
                ctx.fillRect(player.x + player.width, player.y + 25, 30, 8); // Hoja
                ctx.fillStyle = '#7f8c8d'; // Mango
                ctx.fillRect(player.x + player.width - 5, player.y + 22, 5, 14);
            }
        }

        function loop() {
            update();
            draw();
            if (gameActive) requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
